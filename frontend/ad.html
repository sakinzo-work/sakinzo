<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}button,input,textarea,select{font-family:inherit}.login{position:fixed;inset:0;background:radial-gradient(circle at top,#1e3a8a55,#0f1117 45%);display:grid;place-items:center;z-index:99}.login-card{width:min(420px,92vw);background:#181c27;border:1px solid #2a3045;border-radius:18px;padding:32px;box-shadow:0 20px 80px #0008}.login-card h1{font-size:24px;margin-bottom:8px}.login-card p{color:#94a3b8;font-size:14px;margin-bottom:22px}.field{margin-bottom:14px}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:800;margin-bottom:7px}.field input,.field textarea,.field select{width:100%;background:#0f1117;border:1px solid #2a3045;color:#e2e8f0;border-radius:10px;padding:11px 12px;outline:none}.field textarea{min-height:90px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:#3b82f6}.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer}.primary{background:#3b82f6;color:white}.secondary{background:#1e2333;color:#cbd5e1;border:1px solid #2a3045}.danger{background:#ef444422;color:#f87171;border:1px solid #ef444455}.green{background:#10b981;color:white}.layout{display:flex;min-height:100vh}.sidebar{width:250px;background:#181c27;border-right:1px solid #2a3045;position:fixed;top:0;bottom:0;left:0;padding:18px 12px;display:flex;flex-direction:column}.brand{font-size:19px;font-weight:900;padding:10px 12px 22px}.brand span{color:#3b82f6}.nav{display:grid;gap:6px}.nav button{background:transparent;border:none;color:#94a3b8;text-align:left;padding:12px;border-radius:10px;font-weight:700;cursor:pointer}.nav button:hover,.nav button.active{background:#1e2333;color:#3b82f6}.sidefoot{margin-top:auto;display:grid;gap:8px}.main{margin-left:250px;flex:1}.topbar{height:64px;background:#181c27;border-bottom:1px solid #2a3045;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10}.topbar h2{font-size:18px}.content{padding:28px}.page{display:none}.page.active{display:block}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}.card{background:#1e2333;border:1px solid #2a3045;border-radius:14px;padding:16px}.card h3{font-size:15px;margin-bottom:8px}.muted{color:#94a3b8;font-size:13px;line-height:1.5}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:16px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;background:#0f1117;color:#94a3b8;border:1px solid #2a3045}.pill.on{background:#10b98122;color:#34d399;border-color:#10b98155}.thumb{height:90px;width:100%;object-fit:cover;border-radius:10px;margin-bottom:10px;background:#0f1117}.modal{position:fixed;inset:0;background:#000b;display:none;place-items:center;z-index:50;padding:20px}.modal.open{display:grid}.modal-card{width:min(680px,96vw);max-height:90vh;overflow:auto;background:#181c27;border:1px solid #2a3045;border-radius:18px;padding:24px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.notif{position:fixed;right:22px;bottom:22px;background:#10b981;color:white;padding:12px 16px;border-radius:12px;font-weight:800;transform:translateY(80px);opacity:0;transition:.25s;z-index:100}.notif.show{transform:translateY(0);opacity:1}.table{width:100%;border-collapse:collapse;background:#1e2333;border-radius:14px;overflow:hidden}.table th,.table td{padding:12px;border-bottom:1px solid #2a3045;text-align:left;font-size:13px}.table th{color:#94a3b8;text-transform:uppercase;font-size:11px;letter-spacing:.08em}.empty{padding:28px;text-align:center;color:#64748b;border:1px dashed #2a3045;border-radius:14px;background:#1e2333}@media(max-width:800px){.sidebar{position:static;width:100%;height:auto}.layout{display:block}.main{margin-left:0}.grid2{grid-template-columns:1fr}.toolbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}
@media(max-width:800px){
  body{padding-bottom:76px}
  .login-card{padding:24px}
  .sidebar{display:none}
  .layout{display:block}
  .main{margin-left:0;width:100%}
  .topbar{height:auto;min-height:58px;padding:12px 16px}
  .content{padding:16px;overflow-x:auto}
  .cards{grid-template-columns:1fr}
  .card{border-radius:10px}
  .toolbar{align-items:stretch;flex-direction:column}
  .toolbar .btn{width:100%}
  .table{min-width:980px}
  .modal{align-items:start;overflow:auto}
  .modal-card{width:100%;min-height:auto;margin-top:12px;padding:18px;border-radius:12px}
  .row .btn{padding:9px 12px}
}
.bottom-nav{display:none}
@media(max-width:800px){
  .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:6px;overflow-x:auto;background:#181c27;border-top:1px solid #2a3045;padding:8px 10px}
  .bottom-nav button{flex:0 0 auto;background:transparent;border:none;color:#94a3b8;border-radius:10px;padding:10px 12px;font-weight:800;font-size:12px}
  .bottom-nav button.active{background:#1e2333;color:#3b82f6}
}
.brand{display:flex;align-items:center;gap:10px;padding:8px 12px 24px}.brand-logo{width:34px;height:34px;flex:none}.brand-copy{display:flex;flex-direction:column;line-height:1.05}.brand-name{font-size:19px;font-weight:900;color:#f8fafc}.brand-name span{color:#3b82f6}.brand-copy small{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#64748b;margin-top:5px}.modal-card.project-modal{width:min(920px,96vw);padding:0;overflow:hidden}.project-modal .modal-head{padding:22px 26px;margin:0;border-bottom:1px solid #2a3045;background:#1b2030}.project-modal #modalForm{padding:24px;overflow:auto;max-height:calc(90vh - 78px)}.form-section{background:#151923;border:1px solid #2a3045;border-radius:14px;padding:18px;margin-bottom:16px}.form-section-title{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:800;color:#f1f5f9;margin-bottom:16px}.form-section-title span{display:grid;place-items:center;width:25px;height:25px;border-radius:7px;background:#2563eb22;color:#60a5fa;font-size:12px}.field-help{display:block;color:#64748b;font-size:11px;line-height:1.5;margin-top:6px}.project-actions{position:sticky;bottom:-24px;margin:18px -24px -24px;padding:16px 24px;background:#181c27;border-top:1px solid #2a3045;display:flex;justify-content:flex-end;gap:10px;z-index:2}.url-status{display:inline-flex;margin-top:7px;padding:4px 8px;border-radius:999px;background:#10b98118;color:#34d399;font-size:10px;font-weight:800}.card-project-link{display:inline-flex;align-items:center;color:#60a5fa;font-size:12px;font-weight:800;margin-top:10px}.card-project-link:hover{color:#93c5fd}@media(max-width:800px){.modal-card.project-modal{width:100%}.project-modal #modalForm{padding:16px}.form-section{padding:14px}.project-actions{bottom:-16px;margin:16px -16px -16px;padding:14px 16px}.brand{padding-bottom:12px}}
*{scrollbar-width:thin;scrollbar-color:#3b82f6 #151923}*::-webkit-scrollbar{width:7px;height:7px}*::-webkit-scrollbar-track{background:#151923;border-radius:999px}*::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:999px;border:2px solid #151923}*::-webkit-scrollbar-thumb:hover{background:#60a5fa}.bottom-nav button svg{width:21px;height:21px;display:block;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.bottom-nav button span{display:block;font-size:9px;line-height:1;margin-top:4px;white-space:nowrap}@media(max-width:800px){body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}.topbar{backdrop-filter:blur(16px);background:#181c27ee}.topbar h2{font-size:16px}.topbar .btn{padding:9px 12px;font-size:12px}.content{padding:18px 14px 22px}.bottom-nav{height:calc(64px + env(safe-area-inset-bottom));padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:2px;overflow-x:auto;scrollbar-width:none;justify-content:flex-start}.bottom-nav::-webkit-scrollbar{display:none}.bottom-nav button{min-width:62px;flex:1 0 62px;padding:6px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}.bottom-nav button.active{color:#60a5fa;background:#2563eb18}.cards{gap:12px}.card{padding:14px}.thumb{height:150px}.modal{padding:0;align-items:end}.modal-card,.modal-card.project-modal{width:100%;max-height:94dvh;margin:0;border-radius:20px 20px 0 0;border-bottom:0}.project-modal #modalForm{max-height:calc(94dvh - 72px);overscroll-behavior:contain}.modal-head{position:sticky;top:0;z-index:4;background:#1b2030}.table{display:block;overflow:auto;max-width:calc(100vw - 28px);scrollbar-width:thin}.grid2{grid-template-columns:1fr}.project-actions .btn{flex:1}.login-card{border-radius:16px}.notif{left:14px;right:14px;bottom:calc(76px + env(safe-area-inset-bottom));text-align:center}}
.login{background:radial-gradient(circle at 20% 0,#2563eb33,transparent 38%),radial-gradient(circle at 90% 100%,#0ea5e922,transparent 36%),#090d16}.login-card{width:min(460px,92vw);padding:38px;border-radius:24px;background:linear-gradient(145deg,#1b2130,#141823);box-shadow:0 30px 100px #000a}.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}.login-logo{width:46px;height:46px}.login-brand-name{font-size:23px;font-weight:900;color:#f8fafc}.login-brand-name span{color:#3b82f6}.login-brand small{display:block;color:#64748b;text-transform:uppercase;letter-spacing:.16em;font-size:9px;margin-top:4px}.login-card h1{font-size:28px}.password-wrap{position:relative}.password-wrap input{padding-right:48px}.password-eye{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:grid;place-items:center;border:0;border-radius:8px;background:transparent;color:#94a3b8;cursor:pointer}.password-eye:hover{background:#252c3d;color:#fff}.password-eye svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.login-error{display:none;color:#fca5a5;background:#ef444418;border:1px solid #ef444444;border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:14px}.login-error.show{display:block}.btn[disabled]{opacity:.6;cursor:not-allowed}.admin-avatar{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:#2563eb22;color:#60a5fa;font-weight:900}.admin-account-card{display:flex;align-items:center;gap:12px}@media(max-width:800px){.login-card{padding:28px 22px}.login-card h1{font-size:24px}}
</style>
</head>
<body>
<div id="login" class="login">
  <form class="login-card" id="loginForm">
    <div class="login-brand"><svg class="login-logo" viewBox="0 0 36 36" fill="none"><path d="M6 8 L18 2 L30 8 L26 14 L18 11 L10 14 Z" fill="#1673FF"/><path d="M6 8 L10 14 L6 20 L18 34 L30 20 L26 14 L18 11 L10 14 Z" fill="#1673FF" opacity=".85"/><path d="M10 14 L18 11 L26 14 L18 28 Z" fill="rgba(255,255,255,.35)"/></svg><div><div class="login-brand-name">Sakin<span>.zo</span></div><small>Admin Console</small></div></div>
    <h1>Welcome back</h1><p>Sign in with your authorized administrator account.</p>
    <div class="field"><label>Email</label><input name="email" type="email" required placeholder="admin@sakinzo.local"></div>
    <div class="field"><label>Password</label><div class="password-wrap"><input id="loginPassword" name="password" type="password" required placeholder="Enter your password"><button class="password-eye" type="button" onclick="togglePassword()" aria-label="Show password"><svg id="eyeIcon" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <div class="login-error" id="loginError"></div><button class="btn primary" id="loginButton" style="width:100%;padding:13px">Sign in securely</button>
  </form>
</div>
<div class="layout" id="app" style="display:none">
  <aside class="sidebar"><div class="brand"><svg class="brand-logo" viewBox="0 0 36 36" fill="none"><path d="M6 8 L18 2 L30 8 L26 14 L18 11 L10 14 Z" fill="#1673FF"/><path d="M6 8 L10 14 L6 20 L18 34 L30 20 L26 14 L18 11 L10 14 Z" fill="#1673FF" opacity=".85"/><path d="M10 14 L18 11 L26 14 L18 28 Z" fill="rgba(255,255,255,.35)"/></svg><div class="brand-copy"><div class="brand-name">Sakin<span>.zo</span></div><small>Admin Console</small></div></div><div class="nav" id="nav"></div><div class="sidefoot"><a class="btn secondary" href="index.html" target="_blank" style="text-align:center;text-decoration:none">Preview Site</a><button class="btn danger" onclick="logout()">Logout</button></div></aside>
  <main class="main"><div class="topbar"><h2 id="pageTitle">Dashboard</h2><button class="btn green" onclick="loadAll()">Refresh</button></div><div class="content" id="pages"></div></main>
  <div class="bottom-nav" id="bottomNav"></div>
</div>
<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle">Edit</h2><button class="btn secondary" onclick="closeModal()">✕</button></div><form id="modalForm"></form></div></div>
<div class="notif" id="notif">Saved</div>
<script>
const API_BASE = window.API_BASE || 'https://sakinzo.onrender.com/api';
const API_ORIGIN = API_BASE.replace('/api','');
const TOKEN_KEY = 'sakinzo_admin_token';
const navItems = [
  ['dashboard','Dashboard'], ['projects','Projects'], ['clients','Clients'], ['team','Team'], ['testimonials','Testimonials'], ['stats','Stats'], ['mapLocations','Map Locations'], ['sections','Sections'], ['submissions','Submissions'], ['admins','Admin Users']
];
const endpoints = { projects:'projects', clients:'clients', team:'team', testimonials:'testimonials', stats:'stats', mapLocations:'map-locations', admins:'admins' };
let data = { projects:[], clients:[], team:[], testimonials:[], stats:[], mapLocations:[], sections:[], submissions:[], admins:[] };
let currentAdmin = null;
let currentPage = 'dashboard';
let editing = null;

const $ = id => document.getElementById(id);
const token = () => sessionStorage.getItem(TOKEN_KEY);
const esc = (v='') => String(v).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
const mediaUrl = url => url && url.startsWith('/uploads/') ? API_ORIGIN + url : url;
const fmtDate = value => value ? new Date(value).toLocaleString() : '-';
const mailtoUrl = s => `mailto:${encodeURIComponent(s.email || '')}?subject=${encodeURIComponent('Reply from Sakinzo')}&body=${encodeURIComponent(`Hi ${s.name || ''},\n\nThank you for contacting Sakinzo.\n\n`)}`;
const whatsappUrl = phone => {
  const digits = String(phone || '').replace(/\D/g, '');
  return digits ? `https://wa.me/${digits}` : '';
};
function notify(msg='Saved'){ const n=$('notif'); n.textContent=msg; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),1800); }
async function api(path, opts={}){ const res = await fetch(`${API_BASE}${path}`, { ...opts, headers: { 'Content-Type':'application/json', ...(opts.headers||{}), ...(token()?{Authorization:`Bearer ${token()}`}:{}) } }); const json = await res.json().catch(()=>({})); if(!res.ok){ if(res.status===401 && token() && path!=='/auth/login') logout(); throw new Error(json.message || 'Request failed'); } return json; }
async function uploadFile(inputId){ const file = $(inputId)?.files?.[0]; if(!file) return ''; const fd = new FormData(); fd.append('file', file); const res = await fetch(`${API_BASE}/upload`, { method:'POST', headers:{ Authorization:`Bearer ${token()}` }, body: fd }); const json = await res.json(); if(!res.ok) throw new Error(json.message || 'Upload failed'); return json.url; }

window.togglePassword = function(){ const input=$('loginPassword'); const show=input.type==='password'; input.type=show?'text':'password'; $('eyeIcon').style.opacity=show?'.55':'1'; };
$('loginForm').addEventListener('submit', async e => { e.preventDefault(); const btn=$('loginButton'),error=$('loginError'); error.classList.remove('show'); btn.disabled=true; btn.textContent='Signing in...'; try { const f=e.currentTarget; const out=await api('/auth/login',{method:'POST',body:JSON.stringify({email:f.email.value,password:f.password.value})}); sessionStorage.setItem(TOKEN_KEY,out.token); currentAdmin=out.admin; await boot(); } catch(err){ error.textContent=err.message; error.classList.add('show'); } finally { btn.disabled=false; btn.textContent='Sign in securely'; } });
async function boot(){ if(!token()){ $('login').style.display='grid'; $('app').style.display='none'; return; } $('login').style.display='none'; $('app').style.display='flex'; buildNav(); await loadAll(); showPage(currentPage); }
function logout(){ sessionStorage.removeItem(TOKEN_KEY); location.reload(); }
window.logout = logout;
const navIcon=id=>({dashboard:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>',projects:'<svg viewBox="0 0 24 24"><path d="M4 7h16v12H4z"/><path d="M8 7l2-3h4l2 3"/><circle cx="12" cy="13" r="3"/></svg>',clients:'<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',team:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0M16 5a4 4 0 0 1 0 7.5M18 15a6 6 0 0 1 4 6"/></svg>',testimonials:'<svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/><path d="M8 9h8M8 13h5"/></svg>',stats:'<svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>',mapLocations:'<svg viewBox="0 0 24 24"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>',sections:'<svg viewBox="0 0 24 24"><path d="M4 4h16v6H4zM4 14h7v6H4zM15 14h5v6h-5z"/></svg>',submissions:'<svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M4 8l8 6 8-6"/></svg>'}[id]||'');
const adminNavIcon='<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0M19 8v6M16 11h6"/></svg>';
function buildNav(){ const buttons = navItems.map(([id,label])=>`<button id="nav-${id}" onclick="showPage('${id}')">${label}</button>`).join(''); $('nav').innerHTML = buttons; $('bottomNav').innerHTML = navItems.map(([id,label])=>`<button id="bottom-${id}" onclick="showPage('${id}')">${navIcon(id)||(id==='admins'?adminNavIcon:'')}<span>${label}</span></button>`).join(''); }
window.showPage = function(page){ currentPage=page; document.querySelectorAll('.nav button,.bottom-nav button').forEach(b=>b.classList.remove('active')); $(`nav-${page}`)?.classList.add('active'); $(`bottom-${page}`)?.classList.add('active'); $('pageTitle').textContent = navItems.find(x=>x[0]===page)?.[1] || 'Admin'; render(); }
async function loadAll(){ try { const adminsRequest=api('/admins').then(rows=>({rows,available:true})).catch(err=>{if(/route not found/i.test(err.message))return {rows:[],available:false};throw err;}); const [projects,clients,team,testimonials,stats,mapLocations,sections,submissions,adminResult,me] = await Promise.all([api('/projects/admin/all'),api('/clients/admin/all'),api('/team/admin/all'),api('/testimonials/admin/all'),api('/stats/admin/all'),api('/map-locations/admin/all'),api('/sections'),api('/submissions'),adminsRequest,api('/auth/me')]); currentAdmin=me.admin; data={projects,clients,team,testimonials,stats,mapLocations,sections,submissions,admins:adminResult.rows,adminUsersAvailable:adminResult.available}; notify('Data loaded'); render(); } catch(err){ console.error(err); alert(err.message); } }
window.loadAll = loadAll;

function render(){ const p=$('pages'); if(!p) return; if(currentPage==='dashboard') return renderDashboard(p); if(currentPage==='sections') return renderSections(p); if(currentPage==='submissions') return renderSubmissions(p); if(currentPage==='admins') return renderAdmins(p); if(currentPage==='stats') return renderCollection(p,'stats'); return renderCollection(p,currentPage); }
function renderDashboard(p){ p.innerHTML = `<div class="cards">${[['Projects',data.projects.length],['Clients',data.clients.length],['Team',data.team.length],['Testimonials',data.testimonials.length],['Stats',data.stats.length],['Map Locations',data.mapLocations.length],['Submissions',data.submissions.length]].map(x=>`<div class="card"><h3>${x[0]}</h3><div style="font-size:38px;font-weight:900;color:#3b82f6">${x[1]}</div><p class="muted">Real records from MongoDB Atlas.</p></div>`).join('')}</div>`; }
function renderCollection(p,type){ const rows = (data[type]||[]).sort((a,b)=>(a.order||0)-(b.order||0)); p.innerHTML = `<div class="toolbar"><div><h2>${title(type)}</h2><p class="muted">Add, edit, hide/show and delete records from MongoDB.</p></div><button class="btn primary" onclick="openModal('${type}')">+ Add ${title(type)}</button></div>${rows.length?`<div class="cards">${rows.map(itemCard(type)).join('')}</div>`:`<div class="empty">No ${title(type)} added yet.</div>`}`; }
function title(type){ return ({mapLocations:'Map Location', testimonials:'Testimonial', stats:'Stat', admins:'Admin User'}[type] || type.charAt(0).toUpperCase()+type.slice(1)); }
function itemCard(type){ return item => `<div class="card">${imageField(item)}<div class="row" style="justify-content:space-between"><h3>${esc(item.title || item.name || item.value || 'Untitled')}</h3><span class="pill ${item.visible!==false?'on':''}">${item.visible!==false?'Visible':'Hidden'}</span></div><p class="muted">${esc(item.category || item.role || item.label || item.city || item.email || item.desc || item.text || '')}</p>${type==='projects'?`<a class="card-project-link" href="project.html?id=${encodeURIComponent(item._id)}" target="_blank">View project page ↗</a>${item.demoUrl?`<span class="url-status" style="margin-left:8px">Demo ready</span>`:``}`:''}${type==='mapLocations'?`<p class="muted">Lat: ${item.lat}, Lng: ${item.lng}</p>`:''}<div class="row" style="margin-top:14px"><button class="btn secondary" onclick="openModal('${type}','${item._id}')">Edit</button><button class="btn secondary" onclick="toggleVisible('${type}','${item._id}',${item.visible===false})">${item.visible===false?'Show':'Hide'}</button><button class="btn danger" onclick="removeItem('${type}','${item._id}')">Delete</button></div></div>`; }
function imageField(item){ const url = item.img || item.logo; return url ? `<img class="thumb" src="${mediaUrl(url)}" onerror="this.style.display='none'">` : ''; }

function adminForm(item={}){ const id=item._id||''; return `<div class="form-section"><div class="form-section-title"><span>01</span>Account details</div><div class="grid2"><div class="field"><label>Full name *</label><input name="name" required value="${esc(item.name)}" placeholder="Admin name"></div><div class="field"><label>Email address *</label><input name="email" type="email" required value="${esc(item.email)}" placeholder="name@company.com"></div></div><div class="field"><label>${id?'New password (leave blank to keep current)':'Password *'}</label><div class="password-wrap"><input id="adminPassword" name="password" type="password" ${id?'':'required'} minlength="8" placeholder="Minimum 8 characters"><button class="password-eye" type="button" onclick="toggleAdminPassword()" aria-label="Show password"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div><div class="grid2"><div class="field"><label>Role</label><select name="role"><option value="admin" ${item.role!=='owner'?'selected':''}>Admin</option><option value="owner" ${item.role==='owner'?'selected':''}>Owner</option></select></div><div class="field"><label>Access</label><select name="active"><option value="true" ${item.active!==false?'selected':''}>Active</option><option value="false" ${item.active===false?'selected':''}>Disabled</option></select></div></div></div><input type="hidden" name="_id" value="${id}"><div class="project-actions"><button type="button" class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn primary">${id?'Save account':'Create account'}</button></div>`; }
function formFor(type,item={}){ const id = item._id || ''; const visible = item.visible !== false; const order = item.order ?? ((data[type]||[]).length); const common = `<div class="grid2"><div class="field"><label>Order</label><input name="order" type="number" value="${order}"></div><div class="field"><label>Visible</label><select name="visible"><option value="true" ${visible?'selected':''}>Visible</option><option value="false" ${!visible?'selected':''}>Hidden</option></select></div></div>`; const actions = `<input type="hidden" name="_id" value="${id}"><div class="row" style="justify-content:flex-end;margin-top:18px"><button type="button" class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn primary">Save</button></div>`;
 if(type==='projects') return `<div class="form-section"><div class="form-section-title"><span>01</span>Project details</div><div class="field"><label>Project title *</label><input name="title" required value="${esc(item.title)}" placeholder="e.g. AI-powered analytics platform"></div><div class="grid2"><div class="field"><label>Category</label><input name="category" value="${esc(item.category)}" placeholder="Web Development"></div><div class="field"><label>Technology tags</label><input name="tags" value="${esc((item.tags||[]).join(', '))}" placeholder="React, Node.js, MongoDB"><small class="field-help">Separate multiple technologies with commas.</small></div></div><div class="field"><label>Project description</label><textarea name="desc" style="min-height:150px" placeholder="Explain the challenge, solution and outcome...">${esc(item.desc)}</textarea></div></div><div class="form-section"><div class="form-section-title"><span>02</span>Images</div><div class="grid2"><div class="field"><label>Cover image URL</label><input name="img" type="text" value="${esc(item.img)}" placeholder="https://..."><small class="field-help">Used on the homepage card and detail-page hero.</small></div><div class="field"><label>Upload cover image</label><input type="file" id="upload-projects" accept="image/*"><small class="field-help">Uploading replaces the cover image URL.</small></div></div><div class="field"><label>Gallery image URLs</label><textarea name="images" placeholder="https://image-1.jpg, https://image-2.jpg">${esc((item.images||[]).join(', '))}</textarea><small class="field-help">Add multiple URLs separated by commas. They appear in the project gallery.</small></div></div><div class="form-section"><div class="form-section-title"><span>03</span>Live preview & publishing</div><div class="field"><label>Live demo URL</label><input name="demoUrl" type="url" value="${esc(item.demoUrl)}" placeholder="https://your-live-project.com"><small class="field-help">This website will be embedded in an iframe at the bottom of the project detail page.</small>${item.demoUrl?`<span class="url-status">Live preview configured</span>`:``}</div>${common}</div><input type="hidden" name="_id" value="${id}"><div class="project-actions"><button type="button" class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn primary">${id?'Save changes':'Create project'}</button></div>`;
 if(type==='clients') return `<div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Logo URL</label><input name="logo" value="${esc(item.logo)}"></div><div class="field"><label>Upload Logo</label><input type="file" id="upload-clients" accept="image/*"></div><div class="field"><label>Website</label><input name="website" value="${esc(item.website)}"></div>${common}${actions}`;
 if(type==='team') return `<div class="grid2"><div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Role</label><input name="role" value="${esc(item.role)}"></div></div><div class="grid2"><div class="field"><label>Initials</label><input name="initials" value="${esc(item.initials)}"></div><div class="field"><label>Color</label><input name="color" type="color" value="${esc(item.color || '#3b82f6')}"></div></div><div class="grid2"><div class="field"><label>Portfolio</label><input name="portfolio" value="${esc(item.portfolio)}"></div><div class="field"><label>GitHub</label><input name="github" value="${esc(item.github)}"></div></div>${common}${actions}`;
 if(type==='testimonials') return `<div class="grid2"><div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Role</label><input name="role" value="${esc(item.role)}"></div></div><div class="field"><label>Initials</label><input name="initials" value="${esc(item.initials)}"></div><div class="field"><label>Text</label><textarea name="text">${esc(item.text)}</textarea></div>${common}${actions}`;
 if(type==='stats') return `<div class="grid2"><div class="field"><label>Value</label><input name="value" required value="${esc(item.value)}"></div><div class="field"><label>Label</label><input name="label" required value="${esc(item.label)}"></div></div>${common}${actions}`;
 if(type==='mapLocations') return `<div class="field"><label>Location Name</label><input name="name" required value="${esc(item.name)}"></div><div class="grid2"><div class="field"><label>Country</label><input name="country" value="${esc(item.country)}"></div><div class="field"><label>City</label><input name="city" value="${esc(item.city)}"></div></div><div class="grid2"><div class="field"><label>Latitude</label><input name="lat" type="number" step="any" required value="${item.lat ?? ''}"></div><div class="field"><label>Longitude</label><input name="lng" type="number" step="any" required value="${item.lng ?? ''}"></div></div><div class="field"><label>Clients Count</label><input name="clientsCount" type="number" value="${item.clientsCount ?? 1}"></div><div class="field"><label>Notes</label><textarea name="notes">${esc(item.notes)}</textarea></div>${common}${actions}`;
}
window.openModal = function(type,id=''){ editing={type,id}; const item=id?(data[type]||[]).find(x=>x._id===id):{}; $('modalTitle').textContent=(id?'Edit ':'Add ')+title(type); $('modalForm').innerHTML=type==='admins'?adminForm(item||{}):formFor(type,item||{}); $('modal').querySelector('.modal-card').classList.toggle('project-modal',type==='projects'||type==='admins'); $('modal').classList.add('open'); }
window.closeModal = function(){ $('modal').classList.remove('open'); editing=null; }
$('modalForm').addEventListener('submit', async e => { e.preventDefault(); const f=e.currentTarget,type=editing.type,submit=f.querySelector('button:not([type]),button[type="submit"]'); if(submit){submit.disabled=true;submit.dataset.label=submit.textContent;submit.textContent='Saving...';} try { const obj=Object.fromEntries(new FormData(f).entries()); delete obj._id; if(type==='admins'){ obj.active=obj.active==='true'; if(!obj.password) delete obj.password; } else { obj.visible=obj.visible==='true'; obj.order=Number(obj.order||0); obj.tags=obj.tags?obj.tags.split(',').map(x=>x.trim()).filter(Boolean):[]; if(type!=='projects') delete obj.tags; obj.images=obj.images?obj.images.split(',').map(x=>x.trim()).filter(Boolean):[]; if(type!=='projects') delete obj.images; if(obj.lat!==undefined)obj.lat=Number(obj.lat); if(obj.lng!==undefined)obj.lng=Number(obj.lng); if(obj.clientsCount!==undefined)obj.clientsCount=Number(obj.clientsCount||1); const fileUrl=await uploadFile(`upload-${type}`); if(fileUrl){if(type==='projects')obj.img=fileUrl;if(type==='clients')obj.logo=fileUrl;} } const ep=endpoints[type]; if(editing.id) await api(`/${ep}/${editing.id}`,{method:'PUT',body:JSON.stringify(obj)}); else await api(`/${ep}`,{method:'POST',body:JSON.stringify(obj)}); closeModal(); await loadAll(); notify('Saved'); } catch(err){ alert(err.message); } finally {if(submit){submit.disabled=false;submit.textContent=submit.dataset.label||'Save';}} });
window.toggleVisible = async function(type,id,show){ await api(`/${endpoints[type]}/${id}`, {method:'PUT',body:JSON.stringify({ visible: show })}); await loadAll(); }
window.removeItem = async function(type,id){ if(!confirm('Delete this item permanently?')) return; await api(`/${endpoints[type]}/${id}`, {method:'DELETE'}); await loadAll(); }
window.toggleAdminPassword=function(){const input=$('adminPassword');if(input)input.type=input.type==='password'?'text':'password';};
function renderAdmins(p){ const owner=currentAdmin?.role==='owner'; if(data.adminUsersAvailable===false){p.innerHTML='<div class="empty"><h3 style="margin-bottom:8px">Admin Users update pending</h3><p class="muted">Your current login works normally. Deploy the latest backend version to enable additional admin accounts.</p></div>';return;} p.innerHTML=`<div class="toolbar"><div><h2>Admin Users</h2><p class="muted">Manage people who can securely access this console.</p></div>${owner?'<button class="btn primary" onclick="openModal(\'admins\')">+ Add Admin User</button>':''}</div>${data.admins.length?`<div class="cards">${data.admins.map(a=>`<div class="card"><div class="admin-account-card"><div class="admin-avatar">${esc((a.name||'A').slice(0,1).toUpperCase())}</div><div><h3>${esc(a.name)}</h3><p class="muted">${esc(a.email)}</p></div></div><div class="row" style="margin-top:14px"><span class="pill ${a.active!==false?'on':''}">${a.active!==false?'Active':'Disabled'}</span><span class="pill">${esc(a.role||'admin')}</span></div><div class="row" style="margin-top:14px">${owner||String(currentAdmin?.id)===String(a._id)?`<button class="btn secondary" onclick="openModal('admins','${a._id}')">Edit</button>`:''}${owner&&String(currentAdmin?.id)!==String(a._id)?`<button class="btn danger" onclick="removeAdmin('${a._id}')">Delete</button>`:''}</div></div>`).join('')}</div>`:'<div class="empty">No admin users found.</div>'}`; }
window.removeAdmin=async function(id){ if(!confirm('Remove this admin account?'))return; try{await api(`/admins/${id}`,{method:'DELETE'});await loadAll();notify('Admin removed');}catch(err){alert(err.message);} };

function renderSections(p){ const keys=['hero','why','clients','whatwedo','projects','services','cases','map','feedback','insights']; const map={}; (data.sections||[]).forEach(s=>map[s.key]=s.enabled); p.innerHTML=`<div class="toolbar"><div><h2>Sections</h2><p class="muted">Turn website sections on/off.</p></div></div><div class="cards">${keys.map(k=>`<div class="card"><h3>${k}</h3><p class="muted">Current: ${map[k]!==false?'Visible':'Hidden'}</p><button class="btn ${map[k]!==false?'danger':'green'}" onclick="toggleSectionVisibility('${k}',${map[k]===false})">${map[k]!==false?'Hide':'Show'}</button></div>`).join('')}</div>`; }
window.toggleSectionVisibility = async function(key,enabled){ await api(`/sections/${key}`, {method:'PUT',body:JSON.stringify({enabled})}); await loadAll(); }
function renderSubmissions(p){ const rows=data.submissions||[]; p.innerHTML=`<div class="toolbar"><div><h2>Submissions</h2><p class="muted">Leads from contactus.html and the index footer contact form.</p></div><button class="btn secondary" onclick="loadAll()">Refresh</button></div>${rows.length?`<table class="table"><thead><tr><th>Date</th><th>Source</th><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Message</th><th>Attachment</th><th>Reply</th><th>Action</th></tr></thead><tbody>${rows.map(s=>{ const wa=whatsappUrl(s.phone); return `<tr><td>${esc(fmtDate(s.createdAt))}</td><td>${esc(s.source || '-')}</td><td>${esc(s.name)}</td><td>${esc(s.email)}</td><td>${esc(s.phone)}</td><td>${esc(s.company)}</td><td>${esc(s.desc).slice(0,120)}</td><td>${s.attachmentUrl?`<a href="${mediaUrl(s.attachmentUrl)}" target="_blank" style="color:#60a5fa">Open</a>`:'-'}</td><td><div class="row"><a class="btn secondary" href="${mailtoUrl(s)}">Email</a>${wa?`<a class="btn green" href="${wa}" target="_blank">WhatsApp</a>`:`<span class="pill">No phone</span>`}</div></td><td><button class="btn danger" onclick="deleteSubmission('${s._id}')">Delete</button></td></tr>`; }).join('')}</tbody></table>`:`<div class="empty">No submissions yet.</div>`}`; }
window.deleteSubmission = async function(id){ if(!confirm('Delete submission?')) return; await api(`/submissions/${id}`, {method:'DELETE'}); await loadAll(); }
boot();
</script>
</body>
</html>
