<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sakinzo Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}button,input,textarea,select{font-family:inherit}.login{position:fixed;inset:0;background:radial-gradient(circle at top,#1e3a8a55,#0f1117 45%);display:grid;place-items:center;z-index:99}.login-card{width:min(420px,92vw);background:#181c27;border:1px solid #2a3045;border-radius:18px;padding:32px;box-shadow:0 20px 80px #0008}.login-card h1{font-size:24px;margin-bottom:8px}.login-card p{color:#94a3b8;font-size:14px;margin-bottom:22px}.field{margin-bottom:14px}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:800;margin-bottom:7px}.field input,.field textarea,.field select{width:100%;background:#0f1117;border:1px solid #2a3045;color:#e2e8f0;border-radius:10px;padding:11px 12px;outline:none}.field textarea{min-height:90px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:#3b82f6}.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer}.primary{background:#3b82f6;color:white}.secondary{background:#1e2333;color:#cbd5e1;border:1px solid #2a3045}.danger{background:#ef444422;color:#f87171;border:1px solid #ef444455}.green{background:#10b981;color:white}.layout{display:flex;min-height:100vh}.sidebar{width:250px;background:#181c27;border-right:1px solid #2a3045;position:fixed;top:0;bottom:0;left:0;padding:18px 12px;display:flex;flex-direction:column}.brand{font-size:19px;font-weight:900;padding:10px 12px 22px}.brand span{color:#3b82f6}.nav{display:grid;gap:6px}.nav button{background:transparent;border:none;color:#94a3b8;text-align:left;padding:12px;border-radius:10px;font-weight:700;cursor:pointer}.nav button:hover,.nav button.active{background:#1e2333;color:#3b82f6}.sidefoot{margin-top:auto;display:grid;gap:8px}.main{margin-left:250px;flex:1}.topbar{height:64px;background:#181c27;border-bottom:1px solid #2a3045;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10}.topbar h2{font-size:18px}.content{padding:28px}.page{display:none}.page.active{display:block}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}.card{background:#1e2333;border:1px solid #2a3045;border-radius:14px;padding:16px}.card h3{font-size:15px;margin-bottom:8px}.muted{color:#94a3b8;font-size:13px;line-height:1.5}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:16px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;background:#0f1117;color:#94a3b8;border:1px solid #2a3045}.pill.on{background:#10b98122;color:#34d399;border-color:#10b98155}.thumb{height:90px;width:100%;object-fit:cover;border-radius:10px;margin-bottom:10px;background:#0f1117}.modal{position:fixed;inset:0;background:#000b;display:none;place-items:center;z-index:50;padding:20px}.modal.open{display:grid}.modal-card{width:min(680px,96vw);max-height:90vh;overflow:auto;background:#181c27;border:1px solid #2a3045;border-radius:18px;padding:24px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.notif{position:fixed;right:22px;bottom:22px;background:#10b981;color:white;padding:12px 16px;border-radius:12px;font-weight:800;transform:translateY(80px);opacity:0;transition:.25s;z-index:100}.notif.show{transform:translateY(0);opacity:1}.table{width:100%;border-collapse:collapse;background:#1e2333;border-radius:14px;overflow:hidden}.table th,.table td{padding:12px;border-bottom:1px solid #2a3045;text-align:left;font-size:13px}.table th{color:#94a3b8;text-transform:uppercase;font-size:11px;letter-spacing:.08em}.empty{padding:28px;text-align:center;color:#64748b;border:1px dashed #2a3045;border-radius:14px;background:#1e2333}@media(max-width:800px){.sidebar{position:static;width:100%;height:auto}.layout{display:block}.main{margin-left:0}.grid2{grid-template-columns:1fr}.toolbar{align-items:flex-start;flex-direction:column}.content{padding:18px}}
@media(max-width:800px){
  body{padding-bottom:76px}
  .login-card{padding:24px}
  .sidebar{display:none}
  .layout{display:block}
  .main{margin-left:0;width:100%}
  .topbar{height:auto;min-height:58px;padding:12px 16px}
  .content{padding:16px;overflow-x:auto}
  .cards{grid-template-columns:1fr}
  .card{border-radius:10px}
  .toolbar{align-items:stretch;flex-direction:column}
  .toolbar .btn{width:100%}
  .table{min-width:980px}
  .modal{align-items:start;overflow:auto}
  .modal-card{width:100%;min-height:auto;margin-top:12px;padding:18px;border-radius:12px}
  .row .btn{padding:9px 12px}
}
.bottom-nav{display:none}
@media(max-width:800px){
  .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:6px;overflow-x:auto;background:#181c27;border-top:1px solid #2a3045;padding:8px 10px}
  .bottom-nav button{flex:0 0 auto;background:transparent;border:none;color:#94a3b8;border-radius:10px;padding:10px 12px;font-weight:800;font-size:12px}
  .bottom-nav button.active{background:#1e2333;color:#3b82f6}
}
</style>
</head>
<body>
<div id="login" class="login">
  <form class="login-card" id="loginForm">
    <h1>Admin Login</h1><p>Login with the admin account created from backend `.env`.</p>
    <div class="field"><label>Email</label><input name="email" type="email" required placeholder="admin@sakinzo.local"></div>
    <div class="field"><label>Password</label><input name="password" type="password" required placeholder="••••••••"></div>
    <button class="btn primary" style="width:100%">Login</button>
  </form>
</div>
<div class="layout" id="app" style="display:none">
  <aside class="sidebar"><div class="brand">Sakin<span>zo</span></div><div class="nav" id="nav"></div><div class="sidefoot"><a class="btn secondary" href="index.html" target="_blank" style="text-align:center;text-decoration:none">Preview Site</a><button class="btn danger" onclick="logout()">Logout</button></div></aside>
  <main class="main"><div class="topbar"><h2 id="pageTitle">Dashboard</h2><button class="btn green" onclick="loadAll()">Refresh</button></div><div class="content" id="pages"></div></main>
  <div class="bottom-nav" id="bottomNav"></div>
</div>
<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle">Edit</h2><button class="btn secondary" onclick="closeModal()">✕</button></div><form id="modalForm"></form></div></div>
<div class="notif" id="notif">Saved</div>
<script>
const API_BASE = window.API_BASE || 'https://sakinzo.onrender.com/api';
const API_ORIGIN = API_BASE.replace('/api','');
const TOKEN_KEY = 'sakinzo_admin_token';
const navItems = [
  ['dashboard','Dashboard'], ['projects','Projects'], ['clients','Clients'], ['team','Team'], ['testimonials','Testimonials'], ['stats','Stats'], ['mapLocations','Map Locations'], ['sections','Sections'], ['submissions','Submissions']
];
const endpoints = { projects:'projects', clients:'clients', team:'team', testimonials:'testimonials', stats:'stats', mapLocations:'map-locations' };
let data = { projects:[], clients:[], team:[], testimonials:[], stats:[], mapLocations:[], sections:[], submissions:[] };
let currentPage = 'dashboard';
let editing = null;

const $ = id => document.getElementById(id);
const token = () => sessionStorage.getItem(TOKEN_KEY);
const esc = (v='') => String(v).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
const mediaUrl = url => url && url.startsWith('/uploads/') ? API_ORIGIN + url : url;
const fmtDate = value => value ? new Date(value).toLocaleString() : '-';
const mailtoUrl = s => `mailto:${encodeURIComponent(s.email || '')}?subject=${encodeURIComponent('Reply from Sakinzo')}&body=${encodeURIComponent(`Hi ${s.name || ''},\n\nThank you for contacting Sakinzo.\n\n`)}`;
const whatsappUrl = phone => {
  const digits = String(phone || '').replace(/\D/g, '');
  return digits ? `https://wa.me/${digits}` : '';
};
function notify(msg='Saved'){ const n=$('notif'); n.textContent=msg; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),1800); }
async function api(path, opts={}){ const res = await fetch(`${API_BASE}${path}`, { ...opts, headers: { 'Content-Type':'application/json', ...(opts.headers||{}), ...(token()?{Authorization:`Bearer ${token()}`}:{}) } }); const json = await res.json().catch(()=>({})); if(!res.ok){ if(res.status===401) logout(); throw new Error(json.message || 'Request failed'); } return json; }
async function uploadFile(inputId){ const file = $(inputId)?.files?.[0]; if(!file) return ''; const fd = new FormData(); fd.append('file', file); const res = await fetch(`${API_BASE}/upload`, { method:'POST', headers:{ Authorization:`Bearer ${token()}` }, body: fd }); const json = await res.json(); if(!res.ok) throw new Error(json.message || 'Upload failed'); return json.url; }

$('loginForm').addEventListener('submit', async e => { e.preventDefault(); try { const f=e.currentTarget; const out=await api('/auth/login',{method:'POST',body:JSON.stringify({email:f.email.value,password:f.password.value})}); sessionStorage.setItem(TOKEN_KEY,out.token); await boot(); } catch(err){ alert(err.message); } });
async function boot(){ if(!token()){ $('login').style.display='grid'; $('app').style.display='none'; return; } $('login').style.display='none'; $('app').style.display='flex'; buildNav(); await loadAll(); showPage(currentPage); }
function logout(){ sessionStorage.removeItem(TOKEN_KEY); location.reload(); }
window.logout = logout;
function buildNav(){ const buttons = navItems.map(([id,label])=>`<button id="nav-${id}" onclick="showPage('${id}')">${label}</button>`).join(''); $('nav').innerHTML = buttons; $('bottomNav').innerHTML = navItems.map(([id,label])=>`<button id="bottom-${id}" onclick="showPage('${id}')">${label}</button>`).join(''); }
window.showPage = function(page){ currentPage=page; document.querySelectorAll('.nav button,.bottom-nav button').forEach(b=>b.classList.remove('active')); $(`nav-${page}`)?.classList.add('active'); $(`bottom-${page}`)?.classList.add('active'); $('pageTitle').textContent = navItems.find(x=>x[0]===page)?.[1] || 'Admin'; render(); }
async function loadAll(){ try { const [site, sections, submissions] = await Promise.all([api('/public/site-data'), api('/sections'), api('/submissions')]); data = { ...site, sections, submissions }; notify('Data loaded'); render(); } catch(err){ console.error(err); alert(err.message); } }
window.loadAll = loadAll;

function render(){ const p=$('pages'); if(!p) return; if(currentPage==='dashboard') return renderDashboard(p); if(currentPage==='sections') return renderSections(p); if(currentPage==='submissions') return renderSubmissions(p); if(currentPage==='stats') return renderCollection(p,'stats'); return renderCollection(p,currentPage); }
function renderDashboard(p){ p.innerHTML = `<div class="cards">${[['Projects',data.projects.length],['Clients',data.clients.length],['Team',data.team.length],['Testimonials',data.testimonials.length],['Stats',data.stats.length],['Map Locations',data.mapLocations.length],['Submissions',data.submissions.length]].map(x=>`<div class="card"><h3>${x[0]}</h3><div style="font-size:38px;font-weight:900;color:#3b82f6">${x[1]}</div><p class="muted">Real records from MongoDB Atlas.</p></div>`).join('')}</div>`; }
function renderCollection(p,type){ const rows = (data[type]||[]).sort((a,b)=>(a.order||0)-(b.order||0)); p.innerHTML = `<div class="toolbar"><div><h2>${title(type)}</h2><p class="muted">Add, edit, hide/show and delete records from MongoDB.</p></div><button class="btn primary" onclick="openModal('${type}')">+ Add ${title(type)}</button></div>${rows.length?`<div class="cards">${rows.map(itemCard(type)).join('')}</div>`:`<div class="empty">No ${title(type)} added yet.</div>`}`; }
function title(type){ return ({mapLocations:'Map Location', testimonials:'Testimonial', stats:'Stat'}[type] || type.charAt(0).toUpperCase()+type.slice(1)); }
function itemCard(type){ return item => `<div class="card">${imageField(item)}<div class="row" style="justify-content:space-between"><h3>${esc(item.title || item.name || item.value || 'Untitled')}</h3><span class="pill ${item.visible!==false?'on':''}">${item.visible!==false?'Visible':'Hidden'}</span></div><p class="muted">${esc(item.category || item.role || item.label || item.city || item.email || item.desc || item.text || '')}</p>${type==='mapLocations'?`<p class="muted">Lat: ${item.lat}, Lng: ${item.lng}</p>`:''}<div class="row" style="margin-top:14px"><button class="btn secondary" onclick="openModal('${type}','${item._id}')">Edit</button><button class="btn secondary" onclick="toggleVisible('${type}','${item._id}',${item.visible===false})">${item.visible===false?'Show':'Hide'}</button><button class="btn danger" onclick="removeItem('${type}','${item._id}')">Delete</button></div></div>`; }
function imageField(item){ const url = item.img || item.logo; return url ? `<img class="thumb" src="${mediaUrl(url)}" onerror="this.style.display='none'">` : ''; }

function formFor(type,item={}){ const id = item._id || ''; const visible = item.visible !== false; const order = item.order ?? ((data[type]||[]).length); const common = `<div class="grid2"><div class="field"><label>Order</label><input name="order" type="number" value="${order}"></div><div class="field"><label>Visible</label><select name="visible"><option value="true" ${visible?'selected':''}>Visible</option><option value="false" ${!visible?'selected':''}>Hidden</option></select></div></div>`; const actions = `<input type="hidden" name="_id" value="${id}"><div class="row" style="justify-content:flex-end;margin-top:18px"><button type="button" class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn primary">Save</button></div>`;
 if(type==='projects') return `<div class="field"><label>Title</label><input name="title" required value="${esc(item.title)}"></div><div class="grid2"><div class="field"><label>Category</label><input name="category" value="${esc(item.category)}"></div><div class="field"><label>Tags comma separated</label><input name="tags" value="${esc((item.tags||[]).join(', '))}"></div></div><div class="field"><label>Description</label><textarea name="desc">${esc(item.desc)}</textarea></div><div class="field"><label>Cover Image URL</label><input name="img" value="${esc(item.img)}"></div><div class="field"><label>Gallery Image URLs (comma separated)</label><textarea name="images">${esc((item.images||[]).join(','))}</textarea></div><div class="field"><label>Live Demo URL</label><input name="demoUrl" type="url" value="${esc(item.demoUrl)}" placeholder="https://example.com"></div><div class="field"><label>Upload Cover Image</label><input type="file" id="upload-projects" accept="image/*"></div>${common}${actions}`;
 if(type==='clients') return `<div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Logo URL</label><input name="logo" value="${esc(item.logo)}"></div><div class="field"><label>Upload Logo</label><input type="file" id="upload-clients" accept="image/*"></div><div class="field"><label>Website</label><input name="website" value="${esc(item.website)}"></div>${common}${actions}`;
 if(type==='team') return `<div class="grid2"><div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Role</label><input name="role" value="${esc(item.role)}"></div></div><div class="grid2"><div class="field"><label>Initials</label><input name="initials" value="${esc(item.initials)}"></div><div class="field"><label>Color</label><input name="color" type="color" value="${esc(item.color || '#3b82f6')}"></div></div><div class="grid2"><div class="field"><label>Portfolio</label><input name="portfolio" value="${esc(item.portfolio)}"></div><div class="field"><label>GitHub</label><input name="github" value="${esc(item.github)}"></div></div>${common}${actions}`;
 if(type==='testimonials') return `<div class="grid2"><div class="field"><label>Name</label><input name="name" required value="${esc(item.name)}"></div><div class="field"><label>Role</label><input name="role" value="${esc(item.role)}"></div></div><div class="field"><label>Initials</label><input name="initials" value="${esc(item.initials)}"></div><div class="field"><label>Text</label><textarea name="text">${esc(item.text)}</textarea></div>${common}${actions}`;
 if(type==='stats') return `<div class="grid2"><div class="field"><label>Value</label><input name="value" required value="${esc(item.value)}"></div><div class="field"><label>Label</label><input name="label" required value="${esc(item.label)}"></div></div>${common}${actions}`;
 if(type==='mapLocations') return `<div class="field"><label>Location Name</label><input name="name" required value="${esc(item.name)}"></div><div class="grid2"><div class="field"><label>Country</label><input name="country" value="${esc(item.country)}"></div><div class="field"><label>City</label><input name="city" value="${esc(item.city)}"></div></div><div class="grid2"><div class="field"><label>Latitude</label><input name="lat" type="number" step="any" required value="${item.lat ?? ''}"></div><div class="field"><label>Longitude</label><input name="lng" type="number" step="any" required value="${item.lng ?? ''}"></div></div><div class="field"><label>Clients Count</label><input name="clientsCount" type="number" value="${item.clientsCount ?? 1}"></div><div class="field"><label>Notes</label><textarea name="notes">${esc(item.notes)}</textarea></div>${common}${actions}`;
}
window.openModal = function(type,id=''){ editing={type,id}; const item=id?(data[type]||[]).find(x=>x._id===id):{}; $('modalTitle').textContent=(id?'Edit ':'Add ')+title(type); $('modalForm').innerHTML=formFor(type,item||{}); $('modal').classList.add('open'); }
window.closeModal = function(){ $('modal').classList.remove('open'); editing=null; }
$('modalForm').addEventListener('submit', async e => { e.preventDefault(); const f=e.currentTarget; const type=editing.type; const obj=Object.fromEntries(new FormData(f).entries()); delete obj._id; obj.visible = obj.visible === 'true'; obj.order = Number(obj.order || 0); if(obj.tags) obj.tags = obj.tags.split(',').map(x=>x.trim()).filter(Boolean); if(obj.images) obj.images = obj.images.split(',').map(x=>x.trim()).filter(Boolean); if(obj.lat !== undefined) obj.lat=Number(obj.lat); if(obj.lng !== undefined) obj.lng=Number(obj.lng); if(obj.clientsCount !== undefined) obj.clientsCount=Number(obj.clientsCount||1); const fileUrl = await uploadFile(`upload-${type}`).catch(err=>{ alert(err.message); return ''; }); if(fileUrl){ if(type==='projects') obj.img=fileUrl; if(type==='clients') obj.logo=fileUrl; } const ep=endpoints[type]; if(editing.id) await api(`/${ep}/${editing.id}`, { method:'PUT', body:JSON.stringify(obj) }); else await api(`/${ep}`, { method:'POST', body:JSON.stringify(obj) }); closeModal(); await loadAll(); notify('Saved'); });
window.toggleVisible = async function(type,id,show){ await api(`/${endpoints[type]}/${id}`, {method:'PUT',body:JSON.stringify({ visible: show })}); await loadAll(); }
window.removeItem = async function(type,id){ if(!confirm('Delete this item permanently?')) return; await api(`/${endpoints[type]}/${id}`, {method:'DELETE'}); await loadAll(); }

function renderSections(p){ const keys=['hero','why','clients','whatwedo','projects','services','cases','map','feedback','insights']; const map={}; (data.sections||[]).forEach(s=>map[s.key]=s.enabled); p.innerHTML=`<div class="toolbar"><div><h2>Sections</h2><p class="muted">Turn website sections on/off.</p></div></div><div class="cards">${keys.map(k=>`<div class="card"><h3>${k}</h3><p class="muted">Current: ${map[k]!==false?'Visible':'Hidden'}</p><button class="btn ${map[k]!==false?'danger':'green'}" onclick="toggleSectionVisibility('${k}',${map[k]===false})">${map[k]!==false?'Hide':'Show'}</button></div>`).join('')}</div>`; }
window.toggleSectionVisibility = async function(key,enabled){ await api(`/sections/${key}`, {method:'PUT',body:JSON.stringify({enabled})}); await loadAll(); }
function renderSubmissions(p){ const rows=data.submissions||[]; p.innerHTML=`<div class="toolbar"><div><h2>Submissions</h2><p class="muted">Leads from contactus.html and the index footer contact form.</p></div><button class="btn secondary" onclick="loadAll()">Refresh</button></div>${rows.length?`<table class="table"><thead><tr><th>Date</th><th>Source</th><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Message</th><th>Attachment</th><th>Reply</th><th>Action</th></tr></thead><tbody>${rows.map(s=>{ const wa=whatsappUrl(s.phone); return `<tr><td>${esc(fmtDate(s.createdAt))}</td><td>${esc(s.source || '-')}</td><td>${esc(s.name)}</td><td>${esc(s.email)}</td><td>${esc(s.phone)}</td><td>${esc(s.company)}</td><td>${esc(s.desc).slice(0,120)}</td><td>${s.attachmentUrl?`<a href="${mediaUrl(s.attachmentUrl)}" target="_blank" style="color:#60a5fa">Open</a>`:'-'}</td><td><div class="row"><a class="btn secondary" href="${mailtoUrl(s)}">Email</a>${wa?`<a class="btn green" href="${wa}" target="_blank">WhatsApp</a>`:`<span class="pill">No phone</span>`}</div></td><td><button class="btn danger" onclick="deleteSubmission('${s._id}')">Delete</button></td></tr>`; }).join('')}</tbody></table>`:`<div class="empty">No submissions yet.</div>`}`; }
window.deleteSubmission = async function(id){ if(!confirm('Delete submission?')) return; await api(`/submissions/${id}`, {method:'DELETE'}); await loadAll(); }
boot();
</script>
</body>
</html>
