<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project | Sakin.zo</title>
  <meta name="description" content="Explore a Sakin.zo project, its story, technology and live demo.">
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f6f8fc;color:#0d1b2e}a{text-decoration:none;color:inherit}.hdr{height:72px;background:#061326;color:#fff;display:flex;align-items:center}.wrap{width:min(1180px,calc(100% - 40px));margin:auto}.nav{display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:750}.logo span span{color:#1673ff}.back{font-size:14px;color:#cbd5e1}.hero{padding:72px 0 36px}.category{color:#1673ff;text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:800}.hero h1{font-size:clamp(38px,7vw,76px);line-height:1.03;letter-spacing:-.045em;margin:14px 0 22px}.lead{max-width:820px;font-size:clamp(18px,2vw,23px);line-height:1.65;color:#526078;white-space:pre-line}.tags{display:flex;gap:9px;flex-wrap:wrap;margin-top:26px}.tag{padding:8px 13px;border-radius:999px;background:#e7efff;color:#165fce;font-size:13px;font-weight:700}.cover{width:100%;max-height:680px;object-fit:cover;border-radius:24px;display:block;background:#dce5f2;box-shadow:0 24px 70px rgba(13,27,46,.14)}.content{padding:64px 0 90px}.content-grid{display:grid;grid-template-columns:1fr 280px;gap:70px}.content h2{font-size:30px;margin:0 0 20px}.description{font-size:17px;line-height:1.85;color:#4c5b70;white-space:pre-line}.side{background:#fff;border:1px solid #e4e9f1;border-radius:18px;padding:24px;height:max-content}.demo{display:block;background:#1673ff;color:#fff;text-align:center;padding:14px 18px;border-radius:999px;font-weight:750}.demo:hover{background:#0e61dd}.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:52px}.gallery img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:18px;background:#dce5f2}.state{padding:120px 20px;text-align:center;color:#68758a}.state h1{color:#0d1b2e}.footer{padding:28px 0;background:#061326;color:#9babc0;font-size:13px}@media(max-width:760px){.content-grid{grid-template-columns:1fr;gap:34px}.gallery{grid-template-columns:1fr}.hero{padding-top:48px}.wrap{width:min(100% - 28px,1180px)}}
  </style>
</head>
<body>
  <header class="hdr"><div class="wrap nav"><a class="logo" href="index.html"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M6 8 L18 2 L30 8 L26 14 L18 11 L10 14 Z" fill="#1673FF"/><path d="M6 8 L10 14 L6 20 L18 34 L30 20 L26 14 L18 11 L10 14 Z" fill="#1673FF" opacity=".85"/><path d="M10 14 L18 11 L26 14 L18 28 Z" fill="rgba(255,255,255,.35)"/></svg><span>Sakin<span>.zo</span></span></a><a class="back" href="index.html#sec-projects">← All projects</a></div></header>
  <main id="app"><div class="state">Loading project…</div></main>
  <footer class="footer"><div class="wrap">© 2026 SAKIN.ZO LLC. All rights reserved.</div></footer>
  <script>
    const API_BASE=window.API_BASE||'https://sakinzo.onrender.com/api';
    const esc=(v='')=>String(v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    const fullUrl=(url='')=>url.startsWith('/uploads/')?API_BASE.replace('/api','')+url:url;
    const safeUrl=url=>{try{const u=new URL(url,location.href);return ['http:','https:'].includes(u.protocol)?u.href:''}catch{return ''}};
    async function loadProject(){
      const id=new URLSearchParams(location.search).get('id');
      if(!id)return showError('Project not found','No project was selected.');
      try{
        const res=await fetch(`${API_BASE}/public/site-data`);if(!res.ok)throw new Error('Unable to load project');
        const data=await res.json();const p=(data.projects||[]).find(item=>String(item._id)===id);
        if(!p)return showError('Project not found','This project may have been removed or hidden.');
        document.title=`${p.title||'Project'} | Sakin.zo`;
        const images=[p.img,...(Array.isArray(p.images)?p.images:[])].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
        const cover=images[0]?`<div class="wrap"><img class="cover" src="${esc(fullUrl(images[0]))}" alt="${esc(p.title)}"></div>`:'';
        const gallery=images.slice(1).length?`<div class="gallery">${images.slice(1).map((img,i)=>`<img src="${esc(fullUrl(img))}" alt="${esc(p.title)} image ${i+2}" loading="lazy">`).join('')}</div>`:'';
        const demo=safeUrl(p.demoUrl||'');
        document.getElementById('app').innerHTML=`<section class="hero"><div class="wrap"><div class="category">${esc(p.category||'Project')}</div><h1>${esc(p.title||'Untitled project')}</h1><p class="lead">${esc(p.desc||'Project details coming soon.')}</p><div class="tags">${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div></section>${cover}<section class="content"><div class="wrap content-grid"><div><h2>About the project</h2><div class="description">${esc(p.desc||'Project details coming soon.')}</div>${gallery}</div><aside class="side">${demo?`<a class="demo" href="${esc(demo)}" target="_blank" rel="noopener noreferrer">View live demo ↗</a>`:'<strong>Live demo</strong><p style="color:#758196;line-height:1.6;margin-bottom:0">Demo link will be available soon.</p>'}</aside></div></section>`;
      }catch(err){showError('Could not load project',err.message)}
    }
    function showError(title,message){document.getElementById('app').innerHTML=`<div class="state"><h1>${esc(title)}</h1><p>${esc(message)}</p><p><a href="index.html#sec-projects" style="color:#1673ff">Back to projects</a></p></div>`}
    loadProject();
  </script>
</body>
</html>
